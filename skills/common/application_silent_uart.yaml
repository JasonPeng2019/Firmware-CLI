skill_id: common.application_silent_uart
title: Application silent-UART distinction
applies_to:
  board_ids: []
  mcu_families: []
  case_kinds:
    - injected_bug
  task_terms:
    - silent uart
    - no boot ok
    - missing boot ok
priority: 50
facts:
  - Application-level success UART can be absent even when the board still boots and the known symbol remains healthy.
  - A Zephyr banner alone does not satisfy the benchmark success condition; the tracked application success string still matters.
diagnostic_hints:
  - Distinguish missing application success output from a halted-target observability fault.
  - If the known symbol remains healthy and the target is running, inspect the application print path before assuming a runtime-state problem.
verification_checks:
  - Use read_serial after reset and compare against the tracked expected UART substring.
  - If edits are allowed, inspect the application main source for missing printk/boot text logic.
forbidden_actions:
  - Do not classify application-silent UART as observability-only without checking runtime state.
